<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>PAH Web - Settings</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
<header>
  <div><strong>Settings</strong></div>
  <div><a href="/">Back</a></div>
</header>

<div class="container">
  <div class="card">
    <p class="small">
      Paste OneDrive **share links**:
      - Base folder link (projects folder)  
      - CRM CSV link (the combined CRM.csv file)
    </p>

    <label>Base Folder (OneDrive share URL)</label>
    <input id="baseFolderShareUrl" placeholder="https://1drv.ms/..."/>

    <label>CRM CSV (OneDrive share URL)</label>
    <input id="crmCsvShareUrl" placeholder="https://1drv.ms/..."/>

    <div style="margin-top:12px;">
      <button id="btnSave">Save</button>
      <button id="btnConnect" style="margin-left:6px;">Connect OneDrive</button>
    </div>

    <div class="small" id="msg" style="margin-top:10px;"></div>
  </div>
</div>

<script>
async function load() {
  const r = await fetch("/api/settings");
  const s = await r.json();
  baseFolderShareUrl.value = s.baseFolderShareUrl || "";
  crmCsvShareUrl.value = s.crmCsvShareUrl || "";
}
btnSave.onclick = async () => {
  const body = {
    baseFolderShareUrl: baseFolderShareUrl.value.trim(),
    crmCsvShareUrl: crmCsvShareUrl.value.trim(),
  };
  const r = await fetch("/api/settings", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(body)
  });
  msg.textContent = r.ok ? "Saved ✅" : "Save failed ❌";
};
btnConnect.onclick = () => location.href = "/auth/login";
load();
</script>
</body>
</html>
